name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compile
        run: python -m py_compile player.py platform_support.py setup_ui.py link_search.py

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Host smoke test
        run: python player.py smoke-test

      - name: Probe Windows display detection
        if: runner.os == 'Windows'
        run: python -c "import platform_support as p; print([m.label for m in p.configured_monitors()])"

      - name: Probe macOS display detection
        if: runner.os == 'macOS'
        run: python -c "import platform_support as p; print([m.label for m in p.configured_monitors()])"

      - name: Install packager
        run: python -m pip install pyinstaller==6.14.2

      - name: Build installer
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name TelegramYouTubePlayer player.py

      - name: Test packaged Linux executable
        if: runner.os == 'Linux'
        run: ./dist/TelegramYouTubePlayer smoke-test

      - name: Test packaged Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist/TelegramYouTubePlayer.exe" -ArgumentList "smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }

      - name: Test packaged macOS application
        if: runner.os == 'macOS'
        run: ./dist/TelegramYouTubePlayer.app/Contents/MacOS/TelegramYouTubePlayer smoke-test

      - uses: actions/upload-artifact@v7
        with:
          name: TelegramYouTubePlayer-${{ runner.os }}
          path: dist/
          if-no-files-found: error
