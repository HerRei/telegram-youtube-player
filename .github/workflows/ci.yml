name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compile
        run: python -m py_compile player.py platform_support.py setup_ui.py link_search.py

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Host smoke test
        run: |
          python player.py smoke-test
          python player.py queue-smoke-test

      - name: Player script test
        run: |
          python -c "from pathlib import Path; import player; Path('queue-player.js').write_text(player.player_script('test-token', 'http://127.0.0.1:1'), encoding='utf-8')"
          node --check queue-player.js
          node tests/check_player_script.js queue-player.js

      - name: Probe Windows display detection
        if: runner.os == 'Windows'
        run: python -c "import platform_support as p; print([m.label for m in p.configured_monitors()])"

      - name: Probe macOS display detection
        if: runner.os == 'macOS'
        run: python -c "import platform_support as p; print([m.label for m in p.configured_monitors()])"

      - name: Install packager
        run: python -m pip install pyinstaller==6.14.2

      - name: Build installer
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name TelegramYouTubePlayer player.py

      - name: Test packaged Linux executable
        if: runner.os == 'Linux'
        run: |
          ./dist/TelegramYouTubePlayer smoke-test
          ./dist/TelegramYouTubePlayer queue-smoke-test

      - name: Test packaged Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($command in @("smoke-test", "queue-smoke-test")) {
            $process = Start-Process -FilePath "dist/TelegramYouTubePlayer.exe" -ArgumentList $command -Wait -PassThru
            if ($process.ExitCode -ne 0) { exit $process.ExitCode }
          }

      - name: Test packaged macOS application
        if: runner.os == 'macOS'
        run: |
          ./dist/TelegramYouTubePlayer.app/Contents/MacOS/TelegramYouTubePlayer smoke-test
          ./dist/TelegramYouTubePlayer.app/Contents/MacOS/TelegramYouTubePlayer queue-smoke-test

      - uses: actions/upload-artifact@v7
        with:
          name: TelegramYouTubePlayer-${{ runner.os }}
          path: dist/
          if-no-files-found: error
